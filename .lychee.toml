# Configuration for lychee link checker.
# https://lychee.cli.rs/usage/config/

# Don't fail on these status codes (rate-limited / temporary issues).
accept = [200, 206, 429]

# External link timeouts.
timeout = 20
max_retries = 2
retry_wait_time = 5

# Don't show progress bar in CI logs.
no_progress = true

# Skip these paths entirely.
# docs/explorations, docs/research, docs/archive, docs/pocv3, and work/
# are narrative / scratch / historical content not under link discipline.
# internal/check/testdata holds synthetic fixture trees with deliberate
# placeholder links. Excluding them keeps link-check focused on the
# project's user-facing surfaces (README, CHANGELOG, CLAUDE, ADRs).
exclude_path = [
  "node_modules",
  ".git",
  "docs/explorations",
  "docs/research",
  "docs/archive",
  "docs/pocv3",
  "work",
  "internal/check/testdata",
  "internal/skills/embedded",
]

# Skip URLs matching these regexes (locally-bound, examples, or
# repo-internal URLs that may not exist yet during the build phase).
exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://example\\.com",
  "^https?://example\\.org",
  # The install.sh raw URL is referenced in the README but the file
  # doesn't exist yet; install.sh ships in Stage 3.
  "^https?://raw\\.githubusercontent\\.com/23min/aiwf/.*/install\\.sh$",
  # GitHub Discussions URLs 404 until the feature is enabled with the
  # referenced category. Re-evaluate after enabling Discussions.
  "^https?://github\\.com/23min/aiwf/discussions",
  # STATUS.md is gitignored — a post-commit-regenerated snapshot
  # (G-0112) that doesn't exist in a fresh checkout. Tracked docs no
  # longer link to it directly; defense-in-depth keeps this guard so
  # any stray reference doesn't fail link-check.
  "^file://.*/STATUS\\.md$",
]

# Cache results between runs to keep CI fast.
cache = true
max_cache_age = "1d"
