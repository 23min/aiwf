# aiwf consumer-repo config. Append top-level keys (e.g. html: { commit_output: true })
# to opt into framework features. See `aiwf doctor` and the README for the full list.

tree:
  # The aiwfx-wrap-epic ritual creates `work/epics/E-NN-<slug>/wrap.md` per
  # closed epic — a non-entity documentation artefact carrying the epic's
  # closure record (milestones delivered, ADRs ratified, follow-ups
  # carried forward). The kernel's tree-shape rule does not recognize
  # `wrap.md` as an entity file shape, so without this exemption every
  # closed epic produces an `unexpected-tree-file` warning. The exemption
  # is narrow: only `wrap.md` directly under an epic directory; the
  # ritual writes it nowhere else. First exemption added at E-17 wrap.
  #
  # M-0126 (E-0034) adds `TRIAGE.md` under the same shape: a per-file
  # disposition table for docs/pocv3/, co-located with the milestone
  # spec that produced it, not itself an entity.
  allow_paths:
    - work/epics/*/wrap.md
    - work/epics/*/TRIAGE.md

# Per-agent compute policy (G-0353): model + effort injected into the
# materialized `.claude/agents/*.md` cards on `aiwf update`. Advisory —
# a cheaper, independent check (Opus reviews the Sonnet builder's work).
# deployer matches reviewer's tier (G-0361): every irreversible step is
# already human-gated, but classifying the semver bump correctly and
# writing an accurate CHANGELOG summary is a judgment call a human
# reviewing a "confirm?" prompt won't necessarily re-derive from
# scratch — worth the stronger tier even though the safety net here is
# heavier than reviewer's.
agents:
  builder:
    model: sonnet
    effort: xhigh
  reviewer:
    model: opus
    effort: xhigh
  deployer:
    model: opus
    effort: high

hooks:
  worktree-rituals-check.sh:
    enabled: true
