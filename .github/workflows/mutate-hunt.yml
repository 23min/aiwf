# mutate-hunt — on-demand mutation testing via gremlins.
#
# Filed under G44 item 3. Runs gremlins (github.com/go-gremlins/gremlins)
# against the chosen package set, generates source-level mutants
# (CONDITIONALS_NEGATION, CONDITIONALS_BOUNDARY, ARITHMETIC_BASE,
# INVERT_NEGATIVES, INCREMENT_DECREMENT), runs the test suite against
# each, and reports mutation efficacy.
#
# Trigger model:
#   - workflow_dispatch only — never on push, never on cron. Mutation
#     testing is slow (10–60s per package, longer for the heavy ones)
#     and the survivors require human review (equivalent mutants and
#     unreachable-branch mutants are common false positives). Routine
#     CI gating would just create noise; the right cadence is "before
#     a release tag" or "after a substantive test-suite change."
#
# Why --workers 1:
#   The default --workers (CPU count) causes the entity package's
#   test run to time out reliably on this codebase — concurrent
#   workers contend on the test-binary build cache, slowing each
#   individual run past the per-mutant timeout. Single-worker is
#   slower in wall time but produces stable results.
#
# Why --timeout-coefficient 15:
#   The default (3) is too tight for this repo's test suite, which
#   takes ~0.2s baseline but stretches under mutated code paths
#   (especially in packages that do filesystem or git work).
#   Coefficient 15 ⇒ per-mutant timeout = 15 × baseline, generous
#   enough that genuine timeouts (infinite loops induced by a
#   mutation) still fire within reasonable wall time.
#
# Reading the report:
#   - KILLED:    test suite caught the mutation (good).
#   - LIVED:     mutation survived all tests (signal — investigate).
#   - NOT COVERED: mutated code path has no test reaching it (test
#                  gap — write a test or mark the branch ignorable).
#   - TIMED OUT: subprocess exceeded the per-mutant timeout (often
#                an infinite-loop mutant; gremlins counts these as
#                killed in efficacy).
#   Equivalent mutants (semantically identical to the original) and
#   unreachable-branch mutants are common false-positive LIVED cases
#   that no test can kill. Don't chase them.
#
# Scoped multi-dispatch (exclude_files input):
#   A package too large for one dispatch to finish inside
#   timeout-minutes can be split across several dispatches, each
#   covering one file group via --exclude-files (excluding the other
#   groups' files so only the target group's mutants run). Verified
#   with `gremlins unleash --dry-run` that these four groups partition
#   internal/stresstest's production files with no overlap:
#     - verb-sequence:    verb_sequence.go, verb_sequence_list_invariant.go
#       pattern: verb_sequence.*\.go
#     - concurrent:       concurrent_*.go, cross_worktree_*.go, parallel_branch_reallocate.go
#       pattern: (concurrent_|cross_worktree_|parallel_branch_reallocate).*\.go
#     - fault-injection:  force_override_durability.go, archive_during_active_scope.go,
#                         reachability_isolation.go, disk_fault.go, mid_write_kill.go,
#                         head_drift.go, lock_kill.go
#       pattern: (force_override_durability|archive_during_active_scope|reachability_isolation|disk_fault|mid_write_kill|head_drift|lock_kill)\.go
#     - shared-infra:     gitrepo.go, repeat.go, compose.go, verbenvelope.go,
#                         scenario.go, report.go, binary.go, lockholder/main.go
#       pattern: (gitrepo|repeat|compose|verbenvelope|scenario|report|binary)\.go|lockholder/main\.go
#   To scope a dispatch to one group, set exclude_files to the other
#   three groups' patterns, comma-separated. Example — scope to
#   verb-sequence only:
#     (concurrent_|cross_worktree_|parallel_branch_reallocate).*\.go,(force_override_durability|archive_during_active_scope|reachability_isolation|disk_fault|mid_write_kill|head_drift|lock_kill)\.go,(gitrepo|repeat|compose|verbenvelope|scenario|report|binary)\.go|lockholder/main\.go
#   Leave exclude_files empty for a single dispatch covering the whole
#   pkg_pattern (today's default behavior).

name: mutate-hunt

on:
  workflow_dispatch:
    inputs:
      pkg_pattern:
        description: "Go package pattern (e.g., ./internal/version, ./internal/...)"
        required: true
        default: "./internal/..."
      timeout_coefficient:
        description: "Per-mutant timeout = N × baseline test runtime"
        required: true
        default: "15"
      exclude_files:
        description: "Comma-separated filepath-regexps to exclude from mutation (scopes a dispatch to one file group; see header comment). Empty = mutate everything in pkg_pattern."
        required: false
        default: ""

jobs:
  mutate-hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Configure git identity for tests
        run: |
          git config --global user.name "aiwf-ci"
          git config --global user.email "ci@example.com"
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      - name: Run mutation testing
        env:
          EXCLUDE_FILES: ${{ inputs.exclude_files }}
        run: |
          exclude_args=()
          if [ -n "$EXCLUDE_FILES" ]; then
            IFS=',' read -ra patterns <<< "$EXCLUDE_FILES"
            for p in "${patterns[@]}"; do
              exclude_args+=(--exclude-files "$p")
            done
          fi
          gremlins unleash \
            --timeout-coefficient ${{ inputs.timeout_coefficient }} \
            --workers 1 \
            --output mutate-report.json \
            "${exclude_args[@]}" \
            ${{ inputs.pkg_pattern }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutate-report
          path: mutate-report.json
          if-no-files-found: ignore
