name: changelog

on:
  push:
    tags:
      - "v*"

# Enforces the release rule documented in CLAUDE.md § Go conventions § Release
# process: every pushed vX.Y.Z tag must be reachable from a commit
# whose CHANGELOG.md contains a matching `## [X.Y.Z]` heading.
#
# This is the mechanical guarantee — the human-facing rule in
# CLAUDE.md § Go conventions is the convenient version. Per the kernel's "must
# not depend on the LLM's behavior" doctrine, the check is what
# makes changelog discipline real.

jobs:
  changelog-has-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify CHANGELOG has a matching version section
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md is missing — cannot verify $tag."
            echo "See CLAUDE.md § Go conventions § Release process."
            exit 1
          fi
          if ! grep -E "^## \[$version\]" CHANGELOG.md >/dev/null; then
            echo "::error::CHANGELOG.md has no '## [$version]' section for tag $tag."
            echo "Cut the release per CLAUDE.md § Go conventions § Release process before tagging."
            echo
            echo "Expected line shape: ## [$version] — YYYY-MM-DD"
            echo
            echo "Current top-of-file:"
            head -n 30 CHANGELOG.md
            exit 1
          fi
          echo "OK: CHANGELOG.md has a section for $version."
