name: pr-conventions

# Mechanically enforces the PR rules from CLAUDE.md ("Issue and PR conventions" + "Pre-PR audit"):
#   - PR title is a Conventional Commit
#   - PR body cites an issue (Closes/Fixes/Refs #NNN, or a full issue/discussion URL)
#   - CHANGELOG.md was touched under [Unreleased]  (skip with the `internal-only` label)
#
# It does NOT judge whether the work is right — that stays a human review against the principles checklist.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  title:
    name: Conventional commit title
    runs-on: ubuntu-latest
    steps:
      - name: Check title prefix
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Allowed types match the commit-message-style line in CLAUDE.md.
          # Optional scope in parens, optional `!` for breaking change, then `: `.
          pattern='^(feat|fix|docs|chore|refactor|test|build|ci|perf|revert)(\([a-z0-9._-]+\))?!?: .+'
          if ! [[ "$TITLE" =~ $pattern ]]; then
            echo "::error::PR title must follow Conventional Commits, e.g. 'feat(engine): add event append verb'."
            echo "::error::Got: $TITLE"
            exit 1
          fi

  cites-issue:
    name: Body cites an issue
    runs-on: ubuntu-latest
    steps:
      - name: Check body for issue reference
        env:
          BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "$BODY" ]]; then
            echo "::error::PR body is empty. It must cite the Issue (or Discussion) that established this work is wanted."
            exit 1
          fi
          # Accept any of:
          #   Closes #12 / Fixes #12 / Resolves #12 / Refs #12   (case-insensitive)
          #   A bare #12 anywhere in the body
          #   A full URL to issues or discussions in this repo
          pattern_short='#[0-9]+'
          pattern_url="https://github.com/${REPO}/(issues|discussions)/[0-9]+"
          if [[ "$BODY" =~ $pattern_short ]] || [[ "$BODY" =~ $pattern_url ]]; then
            exit 0
          fi
          echo "::error::PR body must cite an Issue or Discussion (e.g. 'Closes #12' or a full discussions URL)."
          exit 1

  changelog:
    name: CHANGELOG entry touched
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'internal-only') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md was modified under [Unreleased]
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if ! git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qx 'CHANGELOG.md'; then
            echo "::error::CHANGELOG.md was not modified."
            echo "::error::Add an entry under [Unreleased], or apply the 'internal-only' label if this PR has no user-visible effect."
            exit 1
          fi
          # Confirm the change actually lands in the [Unreleased] section, not an older release block.
          # Extract the diff hunk for CHANGELOG.md and look for an added line above the next release header.
          diff=$(git diff "$BASE_SHA" "$HEAD_SHA" -- CHANGELOG.md)
          if ! echo "$diff" | awk '
            /^@@/ { in_hunk=1; next }
            in_hunk && /^\+## \[/ && !/\[Unreleased\]/ { exit 1 }
            in_hunk && /^\+/ && !/^\+\+\+/ { added=1 }
            END { exit added ? 0 : 1 }
          '; then
            echo "::error::CHANGELOG.md was modified but no line was added under [Unreleased]."
            echo "::error::If this PR is not user-visible, apply the 'internal-only' label instead."
            exit 1
          fi
