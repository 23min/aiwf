name: go

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/go.yml"
      - "Makefile"
  push:
    branches: [main, "poc/**"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/go.yml"
      - "Makefile"

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
      # Execution firing harness for the golangci-lint config rules
      # (G-0264 / M-0170). The action above does not put golangci-lint on
      # PATH for later steps, so install the binary here — version sourced
      # from the action pin above so there is a single source of truth.
      # AIWF_REQUIRE_GOLANGCI=1 makes the harness fail (not skip) if
      # golangci-lint is somehow absent: no silent vacuous skip.
      - name: Linter-config rule firing harness
        env:
          AIWF_REQUIRE_GOLANGCI: "1"
        run: |
          ver=$(grep -A2 'golangci/golangci-lint-action@v7' .github/workflows/go.yml | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "installing golangci-lint $ver (sourced from the action pin)"
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" "$ver"
          golangci-lint version
          go test -run '^TestGolangciConfigRulesFire$' -count=1 ./internal/policies/

  test:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 gives the diff-scoped coverage gate (below) the
      # full history it needs to resolve the merge-base with origin/main
      # (PRs) or reach github.event.before (trunk pushes). G-0067.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
      - name: Configure git identity for tests
        run: |
          git config --global user.name "aiwf-ci"
          git config --global user.email "ci@example.com"
      # G-0156: hooks materialized by `aiwf init` in integration tests
      # resolve `aiwf` via PATH at hook execution time (post-M-0133 /
      # G-0135 portable-hooks design). Without aiwf on PATH every
      # in-test `git commit` fails. `actions/setup-go` puts
      # `$(go env GOPATH)/bin` on PATH automatically.
      - name: Install aiwf to PATH (required for hooks in tests)
        run: go install ./cmd/aiwf
      # M-0162/AC-4: enables the branchtest Pin
      # registry + the bijection sabotage subtests in
      # internal/policies/m0162_ac4_sabotage_testpins_test.go.
      # Without the tag, the registry is a no-op and the meta-cells
      # would surface as unpinned (caught by AC-4 static check
      # invariant 1). With the tag, the sabotage subtests run their
      # synthetic-data assertions per AC-4 body §"Mechanical
      # assertions" item 4.
      # -race forces -covermode=atomic; the profile feeds both the
      # informational summary and the diff-scoped gate below.
      - run: go test -tags testpins -exec=$GITHUB_WORKSPACE/scripts/sign-and-run.sh -race -parallel 8 -covermode=atomic -coverprofile=coverage.out -coverpkg=./internal/... ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1
      # Profile-driven policy gates. Two gates read the coverage profile
      # built above; both skip in the broad test run (no profile env), so
      # they fire exactly once here with the complete profile:
      #   - Diff-scoped coverage gate (G-0067): fail if any statement on a
      #     line changed vs the base is neither tested nor //coverage:ignore'd.
      #   - Firing-fixture-presence meta-gate (G-0259): fail if any
      #     non-grandfathered policy has a firing branch no test covers,
      #     and keep the grandfatherDark ledger free of stale entries.
      # The base is the merge-base with origin/main on a PR, or
      # github.event.before on a trunk push; an all-zero before-SHA (a
      # brand-new branch) makes the diff-scoped audit no-op.
      - name: Resolve coverage base ref
        id: covbase
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=200 origin main || true
            echo "base=$(git merge-base origin/main HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Profile-driven coverage gates
        env:
          AIWF_COVERAGE_PROFILE: ${{ github.workspace }}/coverage.out
          AIWF_COVERAGE_BASE: ${{ steps.covbase.outputs.base }}
        run: go test -exec=$GITHUB_WORKSPACE/scripts/sign-and-run.sh -run '^TestPolicy_(BranchCoverageAudit|FiringFixturePresence|FiringFixtureNoStaleAllowlist)$' -count=1 ./internal/policies/
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
      - name: Build aiwf
        run: |
          CGO_ENABLED=0 go build -o /tmp/aiwf ./cmd/aiwf
          /tmp/aiwf version
          /tmp/aiwf help

  # vuln runs govulncheck against the dep tree to catch any newly
  # disclosed CVE in a transitive that is reachable from aiwf code.
  # Per the kernel's "validation is the chokepoint" principle this is
  # blocking: a vuln finding fails the workflow. The dep set is small
  # (go-cmp / goldmark / yaml.v3) so the run is ~10s.
  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  # selfcheck drives every verb against a temp repo via
  # `aiwf doctor --self-check`. Catches end-to-end regressions
  # (broken commit trailers, hook installer drift, missing skills,
  # `aiwf init` against a fresh git repo failing) that unit tests miss.
  # If this fails, a verb's end-to-end behavior regressed.
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
      - name: Configure git identity for the test repo
        run: |
          git config --global user.name "aiwf-ci"
          git config --global user.email "ci@example.com"
      # G-0156: aiwf doctor --self-check materializes hooks in its temp
      # repo that resolve `aiwf` via PATH at hook execution time. Without
      # aiwf on PATH the self-check fails at step 3 (add epic) when the
      # pre-commit hook can't find the binary.
      - name: Install aiwf to PATH (required for hooks in selfcheck repo)
        run: go install ./cmd/aiwf
      - name: Build and run aiwf doctor --self-check
        run: make selfcheck
