name: go

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/go.yml"
      - "Makefile"
  push:
    branches: [main, "poc/**"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/go.yml"
      - "Makefile"

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Configure git identity for tests
        run: |
          git config --global user.name "aiwf-ci"
          git config --global user.email "ci@example.com"
      # G-0156: hooks materialized by `aiwf init` in integration tests
      # resolve `aiwf` via PATH at hook execution time (post-M-0133 /
      # G-0135 portable-hooks design). Without aiwf on PATH every
      # in-test `git commit` fails. `actions/setup-go` puts
      # `$(go env GOPATH)/bin` on PATH automatically.
      - name: Install aiwf to PATH (required for hooks in tests)
        run: go install ./cmd/aiwf
      - run: go test -exec=$GITHUB_WORKSPACE/scripts/sign-and-run.sh -race -parallel 8 -coverprofile=coverage.out -coverpkg=./internal/... ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Build aiwf
        run: |
          CGO_ENABLED=0 go build -o /tmp/aiwf ./cmd/aiwf
          /tmp/aiwf version
          /tmp/aiwf help

  # vuln runs govulncheck against the dep tree to catch any newly
  # disclosed CVE in a transitive that is reachable from aiwf code.
  # Per the kernel's "validation is the chokepoint" principle this is
  # blocking: a vuln finding fails the workflow. The dep set is small
  # (go-cmp / goldmark / yaml.v3) so the run is ~10s.
  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  # selfcheck drives every verb against a temp repo via
  # `aiwf doctor --self-check`. Catches end-to-end regressions
  # (broken commit trailers, hook installer drift, missing skills,
  # `aiwf init` against a fresh git repo failing) that unit tests miss.
  # If this fails, a verb's end-to-end behavior regressed.
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Configure git identity for the test repo
        run: |
          git config --global user.name "aiwf-ci"
          git config --global user.email "ci@example.com"
      # G-0156: aiwf doctor --self-check materializes hooks in its temp
      # repo that resolve `aiwf` via PATH at hook execution time. Without
      # aiwf on PATH the self-check fails at step 3 (add epic) when the
      # pre-commit hook can't find the binary.
      - name: Install aiwf to PATH (required for hooks in selfcheck repo)
        run: go install ./cmd/aiwf
      - name: Build and run aiwf doctor --self-check
        run: make selfcheck
