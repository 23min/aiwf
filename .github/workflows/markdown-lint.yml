name: markdown-lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/markdown-lint.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.json"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !node_modules/**
            !docs/explorations/**
            !docs/research/**
            !docs/archive/**
            !docs/pocv3/**
            !work/**
            !internal/check/testdata/**
            !internal/skills/embedded/**
