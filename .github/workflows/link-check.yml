name: link-check

# Catches broken cross-references in markdown when docs reorganize.
# Runs on PRs that touch markdown, and weekly to catch external link rot.

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".lychee.toml"
      - ".github/workflows/link-check.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".lychee.toml"
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
