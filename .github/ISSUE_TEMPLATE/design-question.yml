name: Design question
description: Clarify or challenge something in the architecture document.
title: "design: "
labels: ["design-question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when `docs/architecture.md` is unclear, seems internally inconsistent,
        or the rationale for a design choice isn't obvious.

        For "should we change X?" or feature ideas, please open a [Discussion](../../discussions) instead.

  - type: input
    id: section
    attributes:
      label: Architecture section
      description: Which section of `docs/architecture.md` is this about?
      placeholder: "§3.3 Trace-first writes"
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: What's unclear or seems wrong?
      description: Quote the passage if it helps; describe what you read versus what you expected to find.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What you've tried / read
      description: Other sections, related docs, prior Issues or Discussions you consulted.
    validations:
      required: false

  - type: dropdown
    id: kind
    attributes:
      label: What kind of clarification helps?
      options:
        - The doc should be edited to be clearer
        - The doc is fine; I needed an example
        - The design itself looks inconsistent and should be revisited
        - I think a different choice would be better (proposal — be ready to defend it)
    validations:
      required: true

  - type: checkboxes
    id: confirms
    attributes:
      label: Pre-flight
      options:
        - label: I read the relevant section of `docs/architecture.md` end-to-end before opening this.
          required: true
