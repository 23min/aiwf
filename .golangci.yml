# Lint configuration for the aiwf Go module.
# See CLAUDE.md § Go conventions for the full discipline.
version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - forbidigo
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - thelper
    - unconvert
    - unused
  settings:
    gocritic:
      disabled-checks:
        - hugeParam
      enabled-tags:
        - diagnostic
        - performance
        - style
    govet:
      disable:
        - fieldalignment
      enable-all: true
    forbidigo:
      # Two project-specific rules from CLAUDE.md § Go conventions:
      #   - "Library code never panics or os.Exits. Only cmd/<tool>/main.go
      #      calls os.Exit." (§Error handling)
      #   - The verb/apply.go re-panic in G2's atomic-rollback path is the
      #      single sanctioned panic site; exempted via exclusions below.
      # forbidigo v2 matches the bare qualified name (no trailing call
      # paren); the legacy '^panic\(' / '^os\.Exit\(' forms matched zero
      # sites and went dormant on a toolchain bump (G-0264). The '$'
      # anchor on the bare name is what fires.
      forbid:
        - pattern: '^panic$'
          msg: "library code must not panic; the only sanctioned site is verb/apply.go's controlled re-panic after rollback (G2)"
        - pattern: '^os\.Exit$'
          msg: "library code must not call os.Exit; only cmd/aiwf/main.go does"
        # ADR-0017 AC-3: every bare stdio print routes through the
        # cliutil text-output wrapper set (Errorf/Errorln/Printf/
        # Println/Print) so a stray print can't reintroduce an
        # unaccounted-for output path. forbidigo matches only the
        # callee (fmt.Println), never the argument list — it cannot
        # tell fmt.Fprintln(os.Stdout, …) apart from
        # fmt.Fprintln(someOtherWriter, …), so it bans exactly the
        # three forms that are ALWAYS stdout with no legitimate
        # writer-parameterized variant. The Fprintln/Fprintf-to-
        # os.Stdout/os.Stderr shape (which DOES need argument
        # inspection) is the independent job of
        # internal/policies/logging_chokepoint_test.go.
        - pattern: '^fmt\.Println$'
          msg: "bare fmt.Println; use cliutil.Println (ADR-0017 AC-3)"
        - pattern: '^fmt\.Print$'
          msg: "bare fmt.Print; use cliutil.Print (ADR-0017 AC-3)"
        - pattern: '^fmt\.Printf$'
          msg: "bare fmt.Printf; use cliutil.Printf (ADR-0017 AC-3)"
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
        - name: var-naming
        - name: package-comments
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      # gosec noise that doesn't apply to a developer-CLI threat model:
      # - G204/G702: subprocess via variable / command injection via taint
      #         (gitops and the branch-coverage-audit policy shell out to
      #         git with controlled args — a base ref / SHA from CI or a
      #         Make target on the developer's own repo; that's the point)
      # - G304: file inclusion via variable (the loader and verbs read
      #         user-named entity files; that's their whole purpose)
      # - G301/G302/G306: 0755 dirs, 0o755 chmod (hooks need exec bit),
      #         and 0644 files are the standard for a developer's
      #         working repo, not a multi-tenant server
      # - G122: WalkDir symlink TOCTOU; the consumer repo is the user's
      #         own working tree, not adversarial input
      # - G703: path traversal via taint analysis; aiwf writes to paths
      #         it built from rootDir (user-supplied via --root or
      #         walk-up). Same threat model as G304: developer CLI on
      #         the developer's own repo.
      - linters: [gosec]
        text: "G204|G702|G304|G301|G302|G306|G122|G703"
      # forbidigo: panic/os.Exit are forbidden in *library* (production)
      # code, with sanctioned exceptions (per CLAUDE.md § Go conventions
      # and G2's design):
      #   - _test.go:         test code legitimately calls os.Exit(m.Run())
      #                       in every setup_test.go TestMain (and may panic
      #                       in helpers); the rule targets shipped library
      #                       code, so test files are excluded like
      #                       errcheck/gosec above (G-0264).
      #   - cmd/aiwf/main.go:      the documented os.Exit chokepoint.
      #   - cmd/stresstest/main.go: the stress harness's own entry point
      #     (M-0240/AC-6, dev-only, never installed alongside cmd/aiwf) —
      #     same "only a cmd/<tool>/main.go exits" shape as cmd/aiwf's.
      #   - verb/apply.go:         the controlled re-panic after atomic rollback.
      - linters: [forbidigo]
        path: _test\.go
      - linters: [forbidigo]
        path: cmd/aiwf/main\.go
      - linters: [forbidigo]
        path: cmd/stresstest/main\.go
      - linters: [forbidigo]
        path: internal/verb/apply\.go
      # ADR-0017 AC-3: the two sanctioned raw-stdio writers. outputformat.go
      # is OutputFormat's own text-mode branch; textio.go is the
      # cliutil.Errorf/Errorln/Printf/Println/Print wrapper set every other
      # call site routes through instead.
      - linters: [forbidigo]
        path: internal/cli/cliutil/outputformat\.go
      - linters: [forbidigo]
        path: internal/cli/cliutil/textio\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/23min/aiwf
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
