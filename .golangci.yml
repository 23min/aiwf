# Lint configuration for the ai-workflow Go monorepo.
# See tools/CLAUDE.md for the full discipline.
version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gocritic:
      disabled-checks:
        - hugeParam
      enabled-tags:
        - diagnostic
        - performance
        - style
    govet:
      disable:
        - fieldalignment
      enable-all: true
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
        - name: var-naming
        - name: package-comments
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      # gosec noise that doesn't apply to a developer-CLI threat model:
      # - G204: subprocess via variable (gitops shells out to git with
      #         controlled args; that's its whole purpose)
      # - G304: file inclusion via variable (the loader and verbs read
      #         user-named entity files; that's their whole purpose)
      # - G301/G306: 0755 dirs and 0644 files are the standard for a
      #         developer's working repo, not a multi-tenant server
      # - G122: WalkDir symlink TOCTOU; the consumer repo is the user's
      #         own working tree, not adversarial input
      # - G703: path traversal via taint analysis; aiwf writes to paths
      #         it built from rootDir (user-supplied via --root or
      #         walk-up). Same threat model as G304: developer CLI on
      #         the developer's own repo.
      - linters: [gosec]
        text: "G204|G304|G301|G306|G122|G703"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/23min/ai-workflow-v2
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
